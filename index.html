<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Umbral - Punto de Venta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body class="bg-slate-100 min-h-screen">

    <div id="app" class="max-w-5xl mx-auto p-4 md:p-8">
        
        <header class="flex justify-between items-center mb-8 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <div>
                <h1 class="text-3xl font-black text-indigo-600 uppercase tracking-tighter">Umbral</h1>
                <p class="text-slate-400 text-sm font-medium">Panel de Inventario v1.0 Beta</p>
            </div>
            <div class="hidden md:block">
                <span class="bg-indigo-50 text-indigo-700 px-4 py-2 rounded-full text-xs font-bold border border-indigo-100">
                    ESTADO: BACKEND ACTIVO ⚡
                </span>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-1">
                <div class="bg-white p-6 rounded-2xl shadow-lg border border-slate-200">
                    <h2 class="text-xl font-bold text-slate-800 mb-6">Nuevo Producto</h2>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-1">Nombre</label>
                            <div>
    <label class="block text-sm font-bold text-slate-700 mb-1">Nombre del Producto</label>
    <input v-model="nuevoProducto.nombre" type="text" placeholder="Ej: Salchipapa Especial"
        class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none transition-all duration-300 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10">
</div>
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-1">Precio ($)</label>
                           <div>
    <label class="block text-sm font-bold text-slate-700 mb-1">Precio</label>
    <input v-model.number="nuevoProducto.precio" type="number" step="0.01" placeholder="0.00"
        class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none transition-all duration-300 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10">
</div>
                        </div>
                        <button @click="agregarProducto" 
                            class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl shadow-lg shadow-indigo-200 transition transform active:scale-95">
                            Guardar en Inventario
                        </button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="bg-white rounded-2xl shadow-lg border border-slate-200 overflow-hidden">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-900 text-white text-xs uppercase tracking-wider">
                                <th class="px-6 py-4 font-semibold">Producto</th>
                                <th class="px-6 py-4 font-semibold text-center">Precio</th>
                                <th class="px-6 py-4 font-semibold text-right">Acciones</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-100">
                            <tr v-for="prod in listaProductos" :key="prod.id" class="hover:bg-slate-50 transition">
                                <td class="px-6 py-4">
                                    <div class="font-bold text-slate-800">{{ prod.nombre }}</div>
                                    <div class="text-slate-400 text-xs font-mono">ID: {{ prod.id }}</div>
                                </td>
                                <td class="px-6 py-4 text-center">
                                    <span class="bg-emerald-100 text-emerald-700 px-3 py-1 rounded-lg font-bold whitespace-nowrap">
    $ {{ prod.precio.toFixed(2) }}
</span>
                                </td>
                                <td class="px-6 py-4 text-right">
    <div class="flex justify-end gap-2">
        <button @click="eliminarProducto(prod.id)" 
                class="text-slate-400 hover:text-red-600 p-2 rounded-lg hover:bg-red-50 transition-all duration-200"
                title="Eliminar producto">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
            </svg>
        </button>
    </div>
</td>
                            </tr>
                        </tbody>
                    </table>
                    
                    <div v-if="listaProductos.length === 0" class="p-10 text-center text-slate-400">
                        No hay productos registrados. ¡Agrega el primero!
                    </div>
                </div>
            </div>

        </div>
    
     <transition name="fade">
            <div v-if="notificacion.visible" 
                 :class="notificacion.color"
                 class="fixed top-5 right-5 z-50 px-6 py-3 rounded-2xl shadow-2xl text-white font-bold flex items-center gap-3 transition-all duration-500">
                <span>{{ notificacion.mensaje }}</span>
            </div>
        </transition>
    </div>    
    <script>
        const { createApp } = Vue

        createApp({
            data() {
                return {
                    listaProductos: [],
                    nuevoProducto: {
                        nombre: '',
                        precio: null
                    },
                    notificacion: {
                        visible: false,
                        mensaje: '',
                        color: 'bg-indigo-600'
                    }
                }
            },
            mounted() {
                this.traerDatos()
            },
            methods: {
                // Función para traer datos del Backend (GET)
                async traerDatos() {
                    try {
                        const response = await fetch('http://127.0.0.1:8000/productos')
                        this.listaProductos = await response.json()
                    } catch (e) {
                        alert("Error: Asegúrate de que el Backend esté corriendo en el puerto 8000")
                    }
                },
                
                // Función para enviar datos al Backend (POST)
                async agregarProducto() {
                    if(!this.nuevoProducto.nombre || !this.nuevoProducto.precio) {
                        alert("Por favor llena todos los campos");
                        return;
                    }
                    try {
                        const response = await fetch('http://127.0.0.1:8000/productos', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify(this.nuevoProducto)
                        })
                        if(response.ok) {
                            this.nuevoProducto = { nombre: '', precio: null } // Limpiar formulario
                            this.traerDatos(); // Actualizar tabla
                            this.mostrarToast('¡Producto guardado con éxito!'); 
                        }
                    } catch (e) {
                        console.error("Error al guardar", e)
                    }
                },

                // Función para borrar (DELETE)
                async eliminarProducto(id) {
                    if(confirm("¿Estás seguro de eliminar este producto?")) {
                        try {
                            await fetch(`http://127.0.0.1:8000/productos/${id}`, { method: 'DELETE' })
                            this.traerDatos()
                            this.mostrarToast('Producto eliminado', 'error');
                        } catch (e) {
                            console.error("Error al eliminar", e)
                        }
                    }
                },
                mostrarToast(msj, tipo = 'exito') {
                   this.notificacion.mensaje = msj;
                   this.notificacion.color = tipo === 'exito' ? 'bg-emerald-500' : 'bg-red-500';
                   this.notificacion.visible = true;
            
                   setTimeout(() => {
                   this.notificacion.visible = false;
                   }, 3000);
                }
            }
        }).mount('#app')
    </script>
</body>
</html>
